schema: spec-driven
context: |
    语言：中文（简体）。
    所有说明性产出物（proposal、design、specs、tasks、分析说明、结论）必须使用简体中文撰写。
    代码标识符、接口字段、数据库字段、协议字段遵循项目既有命名规范，不强制中文化。
    ## 开发模式：测试驱动开发（TDD）
    对涉及行为变更的代码实现，默认遵循 TDD：
    1. 红：先编写失败的自动化测试，定义期望行为。
    2. 绿：编写最少实现，使测试通过。
    3. 重构：在测试保护下优化结构、命名与重复逻辑。
    以下场景可不强制执行完整 TDD，但必须说明验证方式与原因：
    - 纯文档修改
    - 非行为性配置调整
    - 样式或文案微调
    - 一次性脚本
    - 探索性 Spike / 原型验证
    ## 代码注释要求
    生成或修改代码时，必须补充与变更范围匹配的必要注释；注释应简洁、准确、可维护。
    - 对测试代码：必须包含简要说明，描述测试目的、测试内容和预期结果。
    - 对功能实现代码：必须包含功能描述，说明模块、类、函数、方法或关键逻辑的职责。
    - 注释应优先解释“做什么”和“为什么这样做”，禁止逐行翻译代码，避免输出无实际维护价值的冗余注释。
    - 若代码本身已较清晰，仍应在测试入口和关键实现处保留最小必要注释，以帮助后续维护和评审。
    ## OpenSpec 产出要求
    - proposal 关注“为什么做、做什么、影响什么”。
    - design 关注“如何设计，以及为什么这样设计”。
    - specs 关注“系统行为如何被验证”。
    - tasks 关注“如何按可执行步骤落地实现”。
    ## 项目上下文复用约定
    若项目已提供能力模块清单、领域边界、术语表、架构约束或能力词表，生成 proposal、design、specs、tasks 时必须优先沿用这些项目定义。
    若项目未提供相关定义，则使用本配置中的通用规则与临时分类方式。
rules:
    proposal:
        - 先判断本次 change 应归属哪个已有 capability；如果无法确定，不要新建，先向我确认。
        - Capability 必须优先归类到项目已定义的能力模块、领域边界或能力词表；若项目已提供相关定义，必须严格沿用，不得擅自新增、拆分或重命名；若没有定义，不要新建，先和我确认。
        - 若现有项目模块和通用能力类别都无法合理归类，必须先说明原因、建议分类方式和影响范围，再请求确认，不得擅自创建新模块。
        - 必须明确业务价值、变更范围、相关方和影响面。
        - 必须定义清晰的验收标准。
        - 必须识别主要风险及缓解措施。
        - 对涉及行为变更的实现，必须明确会通过 TDD 模式完成，并提供自动化测试覆盖。
    design:
        - 必须聚焦当前变更范围，避免为尚未发生的需求做过度设计。
        - 必须包含测试策略，说明测试层次、测试框架、测试组织方式，以及必要的 Mock / Stub 策略。
        - 涉及系统结构、职责边界、模块交互或调用链路调整时，必须提供 Mermaid 图。
        - 涉及 API、页面交互入口或外部系统调用时，必须说明接口/交互设计、输入输出、错误处理及测试要点。
        - 涉及数据持久化、实体关系、索引或状态存储时，必须说明数据模型设计与测试数据准备/清理策略。
        - 涉及认证、授权、敏感信息、外部输入或安全边界时，必须说明安全设计。
        - 涉及性能瓶颈、高并发、高频调用、大数据量或缓存策略时，必须说明性能与扩展性设计。
        - 对影响较大的变更，应评估容错、回滚和降级方案。
        - 引入新技术、基础设施或存在显著方案取舍时，必须说明选型理由和替代方案对比。
        - 若预期会生成或修改代码，设计中应说明代码组织与注释策略，确保测试代码和实现代码均满足可读性要求。
        - 对不适用的章节或内容，应明确说明“不适用”及原因，不得机械补齐空泛内容。
    specs:
        - 必须使用 Given / When / Then 格式。
        - 必须覆盖主流程、边界条件和失败场景，并定义明确的成功/失败条件。
        - 每个 Scenario 都必须足够具体，可直接转换为自动化测试。
        - 应优先补齐异常路径、边界条件和用户/系统可感知的失败行为，避免只描述理想主流程。
        - 必须与 proposal 和 design 保持一致，不得出现未设计、未约定的行为要求。
        - 对用户交互、HTTP 接口、消息消费、定时任务、外部系统调用等行为，应描述触发入口、关键输入、输出结果和可观察反馈。
        - 若某类信息不适用，应明确说明，而不是使用模板化占位内容。
    tasks:
        - 任务必须围绕可交付结果拆分，保持独立、明确、可验证。
        - 任务粒度应尽量控制在半天以内；若明显超过半天，应继续拆分。
        - 必须明确依赖关系、前置条件和验收标准。
        - 对涉及行为变更的功能点，默认至少拆分为以下连续任务：
          1. `[TDD-红]` 编写失败的自动化测试
          2. `[TDD-绿]` 编写最小实现，使测试通过
        - 在适当情况下，应补充 `[TDD-重构]` 任务，用于优化结构、消除重复、改进命名或提升测试可维护性。
        - 任务描述应尽量体现交付目标，而不仅是技术动作。
        - 涉及测试代码编写或修改的任务，必须要求补充简要注释，说明测试目的、测试内容和预期结果。
        - 涉及功能实现代码编写或修改的任务，必须要求补充功能描述注释，说明职责、边界或关键逻辑意图。
        - 若某任务不适用 TDD，必须说明原因及替代验证方式。
